name: python-setup

on: [push]

jobs:
  python-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pytest flake8

      - name: Check Python Version
        run: python --version

      - name: Flake8 Linting
        run: flake8 --version

      - name: Pytest Check
        run: pytest --version
